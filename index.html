<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список задач</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="logo">TD</div>
        <div class="user-menu">
            <span>Личный кабинет</span>
            <div class="dropdown-icon"></div>
        </div>
    </header>

    <h1 class="main-title">Список задач</h1>

    <div class="task-input">
        <input type="text" id="new-task-input" placeholder="Введите новую задачу...">
        <select id="task-emoji">
            <option value="🛒">🛒 Продукты</option>
            <option value="⛽">⛽ Заправить машину</option>
            <option value="🎭">🎭 Культура</option>
            <option value="💼">💼 Работа</option>
            <option value="🏠">🏠 Дом</option>
            <option value="📞">📞 Звонок</option>
        </select>
        <button class="add-button" id="add-task-btn">+</button>
    </div>

    <ol class="task-list" id="task-list">
        <li class="task-item">
            <span class="task-number">1.</span>
            <div class="task-content">
                <span class="emoji">🛒</span>
                Купить продукты (Озон)
                <span>—</span>
                <span class="emoji">⏳</span>
                (завтра, 10:00)
            </div>
            <div class="task-actions">
                <button class="edit-button">✏️</button>
                <button class="delete-button">×</button>
            </div>
        </li>
        <li class="task-item">
            <span class="task-number">2.</span>
            <div class="task-content">
                <span class="emoji">⛽</span>
                Заправить машину (Т-АЗС)
                <span>—</span>
                <span class="emoji">✅</span>
                (вчера)
            </div>
            <div class="task-actions">
                <button class="edit-button">✏️</button>
                <button class="delete-button">×</button>
            </div>
        </li>
        <li class="task-item">
            <span class="task-number">3.</span>
            <div class="task-content">
                <span class="emoji">🎭</span>
                Билеты в театр (Т-Культура)
                <span>—</span>
                <span class="emoji">⏳</span>
                (25 мая)
            </div>
            <div class="task-actions">
                <button class="edit-button">✏️</button>
                <button class="delete-button">×</button>
            </div>
        </li>
    </ol>

    <!-- Модальное окно для редактирования задачи -->
    <div class="modal" id="edit-modal">
        <div class="modal-content">
            <h2>Редактировать задачу</h2>
            <div class="task-input">
                <input type="text" id="edit-task-input" placeholder="Редактировать задачу...">
                <select id="edit-task-emoji">
                    <option value="🛒">🛒 Продукты</option>
                    <option value="⛽">⛽ Заправить машину</option>
                    <option value="🎭">🎭 Культура</option>
                    <option value="💼">💼 Работа</option>
                    <option value="🏠">🏠 Дом</option>
                    <option value="📞">📞 Звонок</option>
                </select>
            </div>
            <div class="modal-buttons">
                <button class="cancel-button" id="cancel-edit">Отмена</button>
                <button class="save-button" id="save-edit">Сохранить</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
