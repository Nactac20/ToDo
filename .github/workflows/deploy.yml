name: Deploy to GitHub Pages

on:
  push:
    branches: [v-1]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'bzz_do/package-lock.json'

      - name: Install & Build
        run: |
          cd bzz_do
          npm ci
          npm run build
        env:
          BASE_URL: /${{ github.event.repository.name }}/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./bzz_do/dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4